<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="500" viewBox="0 0 1024 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fbf8"/>
      <stop offset="100%" stop-color="#e3f3e8"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f5fbf7"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#166534"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <clipPath id="phoneBackClip">
      <rect x="0" y="0" width="170" height="350" rx="34"/>
    </clipPath>
    <clipPath id="phoneFrontClip">
      <rect x="0" y="0" width="196" height="404" rx="38"/>
    </clipPath>
  </defs>

  <rect width="1024" height="500" fill="url(#bg)"/>
  <circle cx="84" cy="88" r="74" fill="#bbf7d0" opacity="0.55"/>
  <circle cx="978" cy="76" r="86" fill="#bfdbfe" opacity="0.35"/>
  <circle cx="930" cy="418" r="88" fill="#fde68a" opacity="0.28"/>
  <circle cx="142" cy="462" r="96" fill="#dcfce7" opacity="0.75"/>

  <rect x="56" y="38" width="176" height="48" rx="18" fill="#ffffff" opacity="0.96"/>
  <rect x="70" y="50" width="24" height="24" rx="8" fill="#166534"/>
  <text x="106" y="68" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#111827">Sportsladder</text>

  <text x="56" y="156" font-family="Arial, sans-serif" font-size="54" font-weight="700" fill="#0f172a">Club ladders</text>
  <text x="56" y="212" font-family="Arial, sans-serif" font-size="54" font-weight="700" fill="#0f172a">for every sport.</text>

  <text x="56" y="262" font-family="Arial, sans-serif" font-size="24" fill="#475569">Rankings, matches and scheduling in one clean app</text>
  <text x="56" y="294" font-family="Arial, sans-serif" font-size="24" fill="#475569">for clubs that want more than spreadsheets.</text>

  <rect x="56" y="332" width="176" height="52" rx="18" fill="url(#accent)"/>
  <text x="144" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff">Web app live</text>

  <rect x="56" y="414" width="94" height="30" rx="15" fill="#edf8f0"/>
  <text x="103" y="434" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#166534">Tennis</text>
  <rect x="158" y="414" width="86" height="30" rx="15" fill="#edf8f0"/>
  <text x="201" y="434" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#166534">Padel</text>
  <rect x="252" y="414" width="96" height="30" rx="15" fill="#edf8f0"/>
  <text x="300" y="434" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#166534">Squash</text>
  <rect x="356" y="414" width="126" height="30" rx="15" fill="#edf8f0"/>
  <text x="419" y="434" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#166534">Table tennis</text>

  <rect x="56" y="452" width="78" height="30" rx="15" fill="#edf8f0"/>
  <text x="95" y="472" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#166534">Golf</text>
  <rect x="142" y="452" width="80" height="30" rx="15" fill="#edf8f0"/>
  <text x="182" y="472" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#166534">Darts</text>
  <rect x="230" y="452" width="110" height="30" rx="15" fill="#edf8f0"/>
  <text x="285" y="472" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#166534">Singles</text>
  <rect x="348" y="452" width="108" height="30" rx="15" fill="#edf8f0"/>
  <text x="402" y="472" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#166534">Doubles</text>

  <g filter="url(#softShadow)">
    <rect x="520" y="42" width="448" height="416" rx="40" fill="url(#panel)" stroke="#d8efde" stroke-width="2"/>
  </g>

  <rect x="548" y="72" width="134" height="36" rx="14" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="2"/>
  <text x="615" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#166534">Live club ladders</text>

  <rect x="692" y="72" width="122" height="36" rx="14" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
  <text x="753" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#475569">Auto rounds</text>

  <rect x="824" y="72" width="112" height="36" rx="14" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
  <text x="880" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#475569">Match flow</text>

  <g transform="translate(572 108) rotate(-7)">
    <g filter="url(#shadow)">
      <rect x="0" y="0" width="170" height="350" rx="34" fill="#0f172a"/>
      <rect x="8" y="8" width="154" height="334" rx="28" fill="#ffffff"/>
      <rect x="62" y="20" width="46" height="6" rx="3" fill="#cbd5e1"/>
      <g transform="translate(8 36)" clip-path="url(#phoneBackClip)">
        <image href="screenshot-1-rankings.png" width="170" height="350" preserveAspectRatio="xMidYMid slice"/>
      </g>
    </g>
  </g>

  <g transform="translate(730 52) rotate(6)">
    <g filter="url(#shadow)">
      <rect x="0" y="0" width="196" height="404" rx="38" fill="#0f172a"/>
      <rect x="9" y="9" width="178" height="386" rx="31" fill="#ffffff"/>
      <rect x="74" y="20" width="48" height="6" rx="3" fill="#cbd5e1"/>
      <g transform="translate(9 38)" clip-path="url(#phoneFrontClip)">
        <image href="screenshot-2-matches.png" width="196" height="404" preserveAspectRatio="xMidYMid slice"/>
      </g>
    </g>
  </g>

  <g filter="url(#softShadow)">
    <rect x="630" y="356" width="170" height="62" rx="22" fill="#ffffff"/>
  </g>
  <text x="652" y="382" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#16a34a">Round 2026-R6</text>
  <text x="652" y="404" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">3 pending matches</text>

  <g filter="url(#softShadow)">
    <rect x="816" y="334" width="130" height="56" rx="20" fill="#ffffff"/>
  </g>
  <text x="881" y="357" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#475569">Riverside</text>
  <text x="881" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#166534">12 players</text>
</svg>
